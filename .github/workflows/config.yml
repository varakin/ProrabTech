name: UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout кода
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настройка Docker Buildx (опционально, но рекомендовано)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2.5 для истории
      - name: Checkout (copy) gh-pages repository to GitHub runner
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./.github/gh-pages

      # 3. Запуск тестов через Docker Compose
      - name: Run UI tests
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          docker compose up --abort-on-container-exit --exit-code-from regression

      # копирование истории    
      - name: Copy history from gh-pages to allure-results
        run: |
          sudo mkdir -p allure-results/history  # Создает директорию для истории Allure
          sudo cp -R ./.github/gh-pages/history/* allure-results/history/

      # 4. Генерация Allure отчета (если тесты прошли или упали)
      - name: Generate Allure report
        if: always()  # Генерировать отчет даже если тесты упали
        run: |
          docker compose run --rm regression allure generate allure-results --clean --output allure-report
      # изменение аллюра для истории
      - name: Update Allure history
        run: |
          sudo cp -R allure-report/history/* ./.github/gh-pages/history/

      # 5. Загрузка Allure отчета как artifact (для просмотра без деплоя)
      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      # 6. Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: true
          clean-exclude: |
            .nojekyll
            .gitattributes


